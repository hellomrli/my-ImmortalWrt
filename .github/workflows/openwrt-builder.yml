name: OpenWrt Builder

on:
  repository_dispatch:
    types: [openwrt-builder]
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to build (comma separated, JSON array, or "all")'
        required: false
        default: 'all'
        type: string
      branches:
        description: 'Branches to build (comma separated, JSON array, or "all")'
        required: false
        default: 'all'
        type: string

permissions:
  actions: write
  contents: write

env:
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
    - name: Generate build matrix
      id: matrix
      shell: bash
      env:
        REQUESTED_SOURCES: ${{ github.event.client_payload.sources || github.event.inputs.sources || 'all' }}
        REQUESTED_BRANCHES: ${{ github.event.client_payload.branches || github.event.inputs.branches || 'all' }}
      run: |
        python3 - <<'PY'
        import json
        import os
        import sys

        targets = [
            {
                "source": "immortalwrt",
                "branch": "master",
                "repo_url": "https://github.com/immortalwrt/immortalwrt",
                "config_file": "configs/immortalwrt.config",
                "diy_p1_sh": "diy-part1.sh",
                "diy_p2_sh": "diy-part2.sh",
            },
            {
                "source": "immortalwrt",
                "branch": "openwrt-25.12",
                "repo_url": "https://github.com/immortalwrt/immortalwrt",
                "config_file": "configs/immortalwrt.config",
                "diy_p1_sh": "diy-part1.sh",
                "diy_p2_sh": "diy-part2.sh",
            },
            {
                "source": "openwrt",
                "branch": "main",
                "repo_url": "https://github.com/openwrt/openwrt",
                "config_file": "configs/openwrt-official.config",
                "diy_p1_sh": "scripts/openwrt-official-part1.sh",
                "diy_p2_sh": "scripts/openwrt-official-part2.sh",
            },
        ]

        def parse_selection(value):
            value = (value or "all").strip()
            if not value or value == "all":
                return None
            try:
                parsed = json.loads(value)
                if isinstance(parsed, str):
                    return {parsed}
                return {str(item).strip() for item in parsed if str(item).strip()}
            except json.JSONDecodeError:
                return {item.strip().strip('"').strip("'") for item in value.split(",") if item.strip()}

        sources = parse_selection(os.environ.get("REQUESTED_SOURCES"))
        branches = parse_selection(os.environ.get("REQUESTED_BRANCHES"))

        selected = [
            target for target in targets
            if (sources is None or target["source"] in sources)
            and (branches is None or target["branch"] in branches)
        ]

        if not selected:
            valid = ", ".join(f'{target["source"]}/{target["branch"]}' for target in targets)
            print(f"::error::No build target matched. Valid targets: {valid}")
            sys.exit(1)

        matrix = json.dumps({"include": selected}, separators=(",", ":"))
        names = ", ".join(f'{target["source"]}/{target["branch"]}' for target in selected)

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"matrix={matrix}\n")
            output.write(f"targets={names}\n")

        print(f"Selected targets: {names}")
        PY

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.source }}-${{ matrix.branch }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool genisoimage ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      run: |
        df -hT "$PWD"
        git clone --depth 1 ${{ matrix.repo_url }} -b ${{ matrix.branch }} openwrt

    - name: Cache OpenWrt DL
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-dl-${{ matrix.source }}-${{ matrix.branch }}-${{ hashFiles(matrix.config_file, matrix.diy_p1_sh, matrix.diy_p2_sh) }}
        restore-keys: |
          ${{ runner.os }}-dl-${{ matrix.source }}-${{ matrix.branch }}-
          ${{ runner.os }}-dl-${{ matrix.source }}-
          ${{ runner.os }}-dl-

    - name: Cache OpenWrt Build
      uses: actions/cache@v4
      with:
        path: openwrt/.ccache
        key: ${{ runner.os }}-build-${{ matrix.source }}-${{ matrix.branch }}-${{ hashFiles(matrix.config_file, matrix.diy_p1_sh, matrix.diy_p2_sh) }}
        restore-keys: |
          ${{ runner.os }}-build-${{ matrix.source }}-${{ matrix.branch }}-

    - name: Load custom feeds
      run: |
        [ -e feeds.conf.default ] && mv feeds.conf.default openwrt/feeds.conf.default
        chmod +x ${{ matrix.diy_p1_sh }}
        cd openwrt
        $GITHUB_WORKSPACE/${{ matrix.diy_p1_sh }}

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e ${{ matrix.config_file }} ] && mv ${{ matrix.config_file }} openwrt/.config
        chmod +x ${{ matrix.diy_p2_sh }}
        cd openwrt
        $GITHUB_WORKSPACE/${{ matrix.diy_p2_sh }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        find dl -size -1024c -print -quit | grep -q . && { echo "Small/invalid download files remain after cleanup"; exit 1; } || true

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        echo "===================="
        echo "Build started at: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "Source: ${{ matrix.source }}"
        echo "Branch: ${{ matrix.branch }}"
        echo "===================="

        if make -j$(nproc); then
          echo "✅ Multi-thread build successful"
        elif make -j1 V=s; then
          echo "⚠️ Single-thread build successful (multi-thread failed)"
        elif make clean && make -j1 V=s; then
          echo "⚠️ Build successful after clean (previous attempts failed)"
        else
          echo "❌ All build attempts failed"
          exit 1
        fi

        echo "===================="
        echo "Build completed at: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "===================="
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "SOURCE_NAME=${{ matrix.source }}" >> $GITHUB_ENV
        echo "BRANCH_NAME=${{ matrix.branch }}" >> $GITHUB_ENV

    - name: Check space
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.SOURCE_NAME }}_${{ env.BRANCH_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        if ! find . -maxdepth 1 -type f \( -name '*.img.gz' -o -name '*kernel.bin' -o -name '*rootfs.tar.gz' \) -print -quit | grep -q .; then
          echo "No firmware images were generated; treating build as failed. Directory contents:"
          find . -maxdepth 1 -type f -printf '%f\n' | sort
          exit 1
        fi
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.SOURCE_NAME }}_${{ env.BRANCH_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=${{ matrix.source }}-${{ matrix.branch }}-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt

        if [ "${{ matrix.source }}" = "immortalwrt" ]; then
          echo "📦 **ImmortalWrt x86_64 固件**" >> release.txt
          echo "" >> release.txt
          echo "🔹 **上游**: ImmortalWrt" >> release.txt
          echo "🔹 **分支**: \`${{ matrix.branch }}\`" >> release.txt
          echo "🔹 **OpenClash**: \`vernesong/OpenClash\`" >> release.txt
          echo "🔹 **构建日期**: $(date '+%Y-%m-%d %H:%M:%S')" >> release.txt
          echo "" >> release.txt
          echo "### 默认配置" >> release.txt
          echo "- IP: 192.168.50.1" >> release.txt
          echo "- 用户名: root" >> release.txt
          echo "- 密码: 无（首次登录需设置）" >> release.txt
          echo "" >> release.txt
          echo "### 已集成插件" >> release.txt
          echo "- OpenClash" >> release.txt
          echo "- Lucky" >> release.txt
          echo "- Watchdog" >> release.txt
          echo "- SQM" >> release.txt
        else
          echo "📦 **Official OpenWrt x86_64 固件**" >> release.txt
          echo "" >> release.txt
          echo "🔹 **上游**: OpenWrt Official" >> release.txt
          echo "🔹 **分支**: \`${{ matrix.branch }}\`" >> release.txt
          echo "🔹 **构建日期**: $(date '+%Y-%m-%d %H:%M:%S')" >> release.txt
          echo "" >> release.txt
          echo "### 默认配置" >> release.txt
          echo "- IP: 192.168.50.1" >> release.txt
          echo "- 用户名: root" >> release.txt
          echo "- 密码: 无（首次登录需设置）" >> release.txt
          echo "" >> release.txt
          echo "### 特性" >> release.txt
          echo "- 官方 OpenWrt 纯净版本" >> release.txt
          echo "- 针对 x86_64 优化" >> release.txt
          echo "- 支持 PVE / QEMU 虚拟化" >> release.txt
        fi

        echo "" >> release.txt
        echo "📖 [完整文档](https://github.com/hellomrli/my-ImmortalWrt/blob/main/README.md)" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Remove old releases
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release list --repo="${{ github.repository }}" --limit 100 --json tagName --jq '.[].tagName' \
          | grep "^${{ matrix.source }}-${{ matrix.branch }}-" \
          | tail -n +6 > old-releases.txt || true
        while read -r tag; do
          [ -n "$tag" ] && gh release delete --repo="${{ github.repository }}" "$tag" --yes --cleanup-tag || true
        done < old-releases.txt

  cleanup-runs:
    needs: build
    if: always()
    runs-on: ubuntu-24.04
    steps:
    - name: Delete workflow runs
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh run list --repo="${{ github.repository }}" --workflow="${{ github.workflow }}" --limit 100 --json databaseId,status --jq '.[] | select(.status != "in_progress") | .databaseId' > old-runs.txt
        tail -n +3 old-runs.txt | while read -r run_id; do
          [ -n "$run_id" ] && gh run delete --repo="${{ github.repository }}" "$run_id" || true
        done
