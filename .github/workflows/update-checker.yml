name: Update Checker

permissions:
  actions: write
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: 0 6 * * *

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: immortalwrt
            repo_url: https://github.com/immortalwrt/immortalwrt
            branch: master
          - source: immortalwrt
            repo_url: https://github.com/immortalwrt/immortalwrt
            branch: openwrt-25.12
          - source: openwrt
            repo_url: https://github.com/openwrt/openwrt
            branch: main

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        mkdir -p .commitHash
        commit_hash="$(git ls-remote "${{ matrix.repo_url }}" "refs/heads/${{ matrix.branch }}" | awk '{print $1}')"
        [ -n "$commit_hash" ] || { echo "Failed to resolve ${{ matrix.repo_url }} branch ${{ matrix.branch }}"; exit 1; }
        echo "${{ matrix.source }}/${{ matrix.branch }}=$commit_hash" > ".commitHash/${{ matrix.source }}-${{ matrix.branch }}"
        echo "commitHash=$commit_hash" >> $GITHUB_OUTPUT

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v4
      with:
        path: .commitHash/${{ matrix.source }}-${{ matrix.branch }}
        key: commitHash_${{ matrix.source }}_${{ matrix.branch }}_${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        cat ".commitHash/${{ matrix.source }}-${{ matrix.branch }}"

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ github.token }}
        event-type: openwrt-builder
        client-payload: '{"sources": "${{ matrix.source }}", "branches": "${{ matrix.branch }}"}'

  cleanup-runs:
    needs: check
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Delete workflow runs
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh run list --repo="${{ github.repository }}" --workflow="${{ github.workflow }}" --limit 100 --json databaseId,status --jq '.[] | select(.status != "in_progress") | .databaseId' > old-runs.txt
        tail -n +3 old-runs.txt | while read -r run_id; do
          [ -n "$run_id" ] && gh run delete --repo="${{ github.repository }}" "$run_id" || true
        done
